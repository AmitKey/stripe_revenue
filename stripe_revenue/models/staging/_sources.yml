version: 2

# ---------------------------------------------------------------------------
# Source: Stripe Raw Data (3 tables)
#
# In production these land in the `raw` schema via ingestion pipelines.
# Locally, dbt seeds (seeds/) load the same data and stand in for sources.
#
# Ingestion notes (see docs/home_assignment.md §1):
#   - raw_stripe_charges & raw_stripe_activity  → Stripe API / webhooks
#   - raw_journal_entries                       → Internal MongoDB collection
# ---------------------------------------------------------------------------

sources:
  - name: stripe_raw
    description: >
      Raw tables loaded from Stripe Connect and DoorLoop's internal MongoDB.
      These are the three source-of-truth tables for addon revenue analysis.
    schema: raw
    loader: fivetran  # placeholder — replace with actual ingestion tool
    freshness:
      warn_after: { count: 24, period: hour }
      error_after: { count: 48, period: hour }

    tables:

      # -----------------------------------------------------------------------
      # raw_stripe_charges
      # One row per Stripe charge. Source of truth for gross amount collected.
      # NOTE: journalentry_id and expected_transfer_amount are set at charge
      # creation time and are LESS accurate than the actual transfer event in
      # raw_stripe_activity. Prefer activity-derived amounts downstream.
      # -----------------------------------------------------------------------
      - name: raw_stripe_charges
        description: >
          One row per Stripe charge. Source of truth for the gross amount
          collected from the end customer.
          journalentry_id and expected_transfer_amount are populated at charge
          creation time — less accurate than actual transfer events that arrive
          later in raw_stripe_activity.
        loaded_at_field: created_at
        columns:
          - name: charge_id
            description: Stripe charge ID (primary key).
            tests:
              - unique
              - not_null
          - name: stripe_customer_id
            description: Stripe customer ID at the platform / billing level.
          - name: stripe_tenant_customer_id
            description: Stripe customer ID at the Connect / tenant level.
          - name: charge_amount
            description: Gross amount collected from the end customer (USD).
          - name: charge_status
            description: >
              Charge lifecycle status. Expected values: succeeded, failed,
              pending, refunded, disputed.
          - name: created_at
            description: Charge creation timestamp (UTC).
            tests:
              - not_null
          - name: journalentry_id
            description: >
              Internal journal entry ID set at charge creation time.
              Use as a soft join key to raw_journal_entries; prefer the join
              via charge_id where possible — see raw_journal_entries note.
          - name: expected_transfer_amount
            description: >
              Expected transfer to connected account, set at charge creation.
              Less accurate than the connect_transfer event in
              raw_stripe_activity. Do NOT use for net revenue calculation.

      # -----------------------------------------------------------------------
      # raw_stripe_activity
      # Every financial event Stripe reports. Multiple rows per charge.
      # Events arrive at different times (fees, disputes days/weeks later).
      # -----------------------------------------------------------------------
      - name: raw_stripe_activity
        description: >
          Every financial event Stripe reports. Multiple rows can belong to the
          same charge. Events for the same charge arrive at different times —
          fees and dispute charges can trickle in days or weeks after the
          original charge.
        loaded_at_field: event_at
        columns:
          - name: balance_transaction_id
            description: Unique Stripe balance-transaction ID (primary key).
            tests:
              - unique
              - not_null
          - name: charge_id
            description: >
              Stripe charge this event belongs to. Not all activity rows have a
              matching charge in raw_stripe_charges (e.g. dispute fees on
              already-resolved charges, orphaned refunds).
          - name: event_at
            description: Exact timestamp of financial event (EST per Stripe export).
            tests:
              - not_null
          - name: event_type
            description: >
              High-level event type.
              Values: charge, fee, transfer, refund, dispute, reversal.
          - name: event_subtype
            description: >
              Detailed subtype.
              Values: charge, processing_fee, interchange, connect_transfer,
              dispute_fee, refund, reversal.
          - name: amount
            description: Event amount in USD (converted from original currency).
          - name: flow_direction
            description: >
              Direction of money flow from the platform perspective.
              Values: inflow, outflow.
              KNOWN ANOMALY: txn_009 (ch_CCC connect_transfer) is tagged
              inflow — investigate before using in revenue models.
          - name: currency
            description: Original transaction currency code (e.g. USD, CAD).
          - name: amount_original_currency
            description: >
              Amount in original currency before USD conversion.
              Null when currency conversion failed — flag these rows.
              KNOWN ANOMALY: txn_008 (ch_CCC charge, CAD) has a null value here.

      # -----------------------------------------------------------------------
      # raw_journal_entries
      # Internal MongoDB table mapping each Stripe charge to a DoorLoop
      # tenant and addon type. NOT from Stripe — different ingestion path.
      # -----------------------------------------------------------------------
      - name: raw_journal_entries
        description: >
          Internal MongoDB collection mapping each Stripe charge to a DoorLoop
          tenant and addon product type. This is the only table that tells us
          which addon (payments vs. screening) generated a given charge.
          NOT sourced from Stripe — ingestion freshness and reliability differ
          from the Stripe tables. Use charge_id as the join key; journalentry_id
          from raw_stripe_charges is a charge-creation-time estimate and may be
          stale or mismatched.
          KNOWN ANOMALY: charge ch_DDD has two journal entries (je_004 payments,
          je_005 screening) — requires deduplication logic in staging.
        columns:
          - name: journalentry_id
            description: Internal journal entry ID (primary key in MongoDB).
            tests:
              - unique
              - not_null
          - name: charge_id
            description: >
              Stripe charge ID — join key to raw_stripe_charges and
              raw_stripe_activity. NOT guaranteed unique in this table
              (ch_DDD appears twice with different addon_types).
          - name: dbtenant_id
            description: Internal DoorLoop tenant identifier (main customer ID).
            tests:
              - not_null
          - name: addon_type
            description: >
              Addon product type.
              Values: payments, screening.
            tests:
              - not_null
              - accepted_values:
                  values: ["payments", "screening"]
